name: Publish package

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test sdist
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  validate-stable-tag:
    name: Validate stable release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      is_stable: ${{ steps.check.outputs.is_stable }}

    steps:
      - name: Check whether tag is a stable release
        id: check
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "Stable release tag detected: $tag"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "Not a stable release tag: $tag"
          fi

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/oamc
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
      - validate-stable-tag
    if: startsWith(github.ref, 'refs/tags/') && needs.validate-stable-tag.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/oamc
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
